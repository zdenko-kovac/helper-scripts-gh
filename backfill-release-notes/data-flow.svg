<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 70" width="980" height="70">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #1e1e1e; }
    .label { font-size: 11px; fill: #868e96; }
    .box-text { font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <!-- gh api /releases -->
  <rect x="2" y="2" width="130" height="50" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="67" y="32" text-anchor="middle" class="box-text">gh api /releases</text>
  <line x1="138" y1="27" x2="208" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="173" y="18" text-anchor="middle" class="label">paginate</text>
  <!-- all[] -->
  <rect x="214" y="2" width="70" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="249" y="32" text-anchor="middle" class="box-text">all[]</text>
  <line x1="290" y1="27" x2="360" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="18" text-anchor="middle" class="label">filter(!prefix)</text>
  <!-- included[] -->
  <rect x="366" y="2" width="110" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="421" y="32" text-anchor="middle" class="box-text">included[]</text>
  <line x1="482" y1="27" x2="552" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="517" y="18" text-anchor="middle" class="label">sort(date)</text>
  <!-- missing[] -->
  <rect x="558" y="2" width="100" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="608" y="32" text-anchor="middle" class="box-text">missing[]</text>
  <line x1="664" y1="27" x2="744" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="704" y="18" text-anchor="middle" class="label">generate-notes</text>
  <!-- PATCH release -->
  <rect x="750" y="2" width="140" height="50" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="820" y="32" text-anchor="middle" class="box-text">PATCH release</text>
</svg>
