<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 70" width="960" height="70">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #1e1e1e; }
    .label { font-size: 11px; fill: #868e96; }
    .box-text { font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <!-- search/issues -->
  <rect x="2" y="2" width="130" height="50" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="67" y="32" text-anchor="middle" class="box-text">search/issues</text>
  <line x1="138" y1="27" x2="208" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="173" y="18" text-anchor="middle" class="label">paginate</text>
  <!-- issues[] -->
  <rect x="214" y="2" width="100" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="264" y="32" text-anchor="middle" class="box-text">issues[]</text>
  <line x1="320" y1="27" x2="400" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="360" y="18" text-anchor="middle" class="label">exclude labels</text>
  <!-- filtered[] -->
  <rect x="406" y="2" width="110" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="461" y="32" text-anchor="middle" class="box-text">filtered[]</text>
  <line x1="522" y1="27" x2="592" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="557" y="18" text-anchor="middle" class="label">group(repo)</text>
  <!-- byRepo{} -->
  <rect x="598" y="2" width="110" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="653" y="32" text-anchor="middle" class="box-text">byRepo{}</text>
  <line x1="714" y1="27" x2="784" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="749" y="18" text-anchor="middle" class="label">format</text>
  <!-- stdout / .md -->
  <rect x="790" y="2" width="120" height="50" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="850" y="32" text-anchor="middle" class="box-text">stdout / .md</text>
</svg>
