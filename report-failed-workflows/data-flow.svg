<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 70" width="1290" height="70">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #1e1e1e; }
    .label { font-size: 11px; fill: #868e96; }
    .box-text { font-size: 14px; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
  <!-- orgs/repos -->
  <rect x="2" y="2" width="120" height="50" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="62" y="32" text-anchor="middle" class="box-text">orgs/repos</text>
  <line x1="128" y1="27" x2="188" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="158" y="18" text-anchor="middle" class="label">paginate</text>
  <!-- repos[] -->
  <rect x="194" y="2" width="100" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="244" y="32" text-anchor="middle" class="box-text">repos[]</text>
  <line x1="300" y1="27" x2="360" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="18" text-anchor="middle" class="label">per repo</text>
  <!-- actions/runs -->
  <rect x="366" y="2" width="120" height="50" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="426" y="32" text-anchor="middle" class="box-text">actions/runs</text>
  <line x1="492" y1="27" x2="562" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="527" y="18" text-anchor="middle" class="label">group(wf)</text>
  <!-- failedRuns[] -->
  <rect x="568" y="2" width="120" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="628" y="32" text-anchor="middle" class="box-text">failedRuns[]</text>
  <line x1="694" y1="27" x2="764" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="729" y="18" text-anchor="middle" class="label">check success</text>
  <!-- stillBroken[] -->
  <rect x="770" y="2" width="120" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="830" y="32" text-anchor="middle" class="box-text">stillBroken[]</text>
  <line x1="896" y1="27" x2="956" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="926" y="18" text-anchor="middle" class="label">jobs API</text>
  <!-- analyzed[] -->
  <rect x="962" y="2" width="110" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="1017" y="32" text-anchor="middle" class="box-text">analyzed[]</text>
  <line x1="1078" y1="27" x2="1148" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1113" y="18" text-anchor="middle" class="label">format</text>
  <!-- stdout / .md -->
  <rect x="1154" y="2" width="120" height="50" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="1214" y="32" text-anchor="middle" class="box-text">stdout / .md</text>
</svg>
