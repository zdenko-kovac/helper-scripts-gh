<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 70" width="880" height="70">
  <style>
    text { font-family: 'Segoe UI', system-ui, sans-serif; fill: #1e1e1e; }
    .label { font-size: 12px; fill: #868e96; }
    .box-text { font-size: 15px; }
  </style>
  <!-- GHES REST API -->
  <rect x="2" y="2" width="160" height="50" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="82" y="32" text-anchor="middle" class="box-text">GHES REST API</text>
  <!-- Arrow 1 -->
  <line x1="168" y1="27" x2="258" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="213" y="18" text-anchor="middle" class="label">paginate</text>
  <!-- allRepos[] -->
  <rect x="264" y="2" width="130" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="329" y="32" text-anchor="middle" class="box-text">allRepos[]</text>
  <!-- Arrow 2 -->
  <line x1="400" y1="27" x2="490" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="445" y="18" text-anchor="middle" class="label">filter(!archived)</text>
  <!-- active[] -->
  <rect x="496" y="2" width="120" height="50" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="556" y="32" text-anchor="middle" class="box-text">active[]</text>
  <!-- Arrow 3 -->
  <line x1="622" y1="27" x2="712" y2="27" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="667" y="18" text-anchor="middle" class="label">git clone</text>
  <!-- disk -->
  <rect x="718" y="2" width="100" height="50" rx="8" fill="#ffec99" stroke="#1e1e1e" stroke-width="2"/>
  <text x="768" y="32" text-anchor="middle" class="box-text">disk</text>
  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/>
    </marker>
  </defs>
</svg>
